<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invito - Finance Flow</title>
  </head>
  <body style="margin:0;padding:0;background:#f3eee8;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#3d3227;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;background:#f3eee8;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#fcfaf7;border:1px solid #d7cabd;border-radius:20px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 12px;background:linear-gradient(135deg,#8b7152,#7e846f);color:#fcfaf7;">
                <div style="font-size:13px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.9;">Finance Flow</div>
                <h1 style="margin:8px 0 0;font-size:24px;line-height:1.2;">Hai ricevuto un invito</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px 8px;">
                <p style="margin:0 0 12px;font-size:15px;line-height:1.6;">
                  Ti hanno invitato a usare Finance Flow. Completa l'accesso dal pulsante qui sotto.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="border-radius:999px;background:#8b7152;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 22px;font-size:14px;font-weight:600;color:#fcfaf7;text-decoration:none;">Accetta invito</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:10px 28px 26px;">
                <p style="margin:0 0 10px;font-size:13px;line-height:1.6;color:#75695d;">
                  Se non ti aspettavi questo invito, ignora pure questa email.
                </p>
                <p style="margin:0;font-size:12px;line-height:1.6;color:#8a7e72;">
                  Finance Flow · Educazione finanziaria semplice e concreta.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
